title: clean
author: Grant McDermott [Modified by Jozef Rivest]
version: 1.4.1
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, clean.scss]
      # logo: logo.png
      menu:
        side: left
      slide-number: true
      date-format: long
      html-math-method:
        method: mathjax
        url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
      include-before-body:
        - text: |
            <script src="mathjax-config.js"></script>
      include-after-body:
        - text: |
            <script src="footer-config.js"></script>
      format-resources:
        - mathjax-config.js
        - footer-config.js
